<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSEDDY — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2e3350; --accent: #4f8ef7; --accent2: #38d9a9;
    --danger: #f76b6b; --text: #e8eaf0; --text2: #8b90a7;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-top: 3px solid var(--accent); border-radius: 12px;
    padding: 40px 36px; width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo { font-family: var(--mono); font-size: 1.4rem; font-weight: 600; color: var(--accent); letter-spacing: 3px; margin-bottom: 4px; }
  .logo span { color: var(--accent2); }
  .subtitle { font-size: 0.8rem; color: var(--text2); margin-bottom: 32px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .field input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 6px;
    font-family: var(--sans); font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }

  .btn-login {
    width: 100%; padding: 11px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-family: var(--sans);
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s; margin-top: 8px; letter-spacing: 0.5px;
  }
  .btn-login:hover { background: #3a7be0; }

  .error-msg {
    background: rgba(247,107,107,0.1); border: 1px solid rgba(247,107,107,0.3);
    border-radius: 6px; padding: 10px 14px; margin-bottom: 20px;
    font-size: 0.82rem; color: var(--danger);
  }

  .footer-note { margin-top: 24px; font-size: 0.75rem; color: var(--text2); text-align: center; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">SYS<span>EDDY</span></div>
  <div class="subtitle">Sistema de Registro de Calificaciones</div>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="field">
      <label>Usuario</label>
      <input type="text" name="usuario" placeholder="Tu usuario" required autofocus>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="Tu contraseña" required>
    </div>
    <button type="submit" class="btn-login">🔐 Ingresar al Sistema</button>
  </form>

  <div class="footer-note">Acceso restringido — Solo personal autorizado</div>
</div>
</body>
</html>
