<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Calificaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Spectral:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --primary-dark: #0f2341;
            --secondary: #38a169;
            --secondary-light: #48bb78;
            --accent: #ed8936;
            --accent-light: #f6ad55;
            --danger: #e53e3e;
            --warning: #ecc94b;
            --bg: #f7fafc;
            --surface: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-lg: rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: var(--surface);
            border-radius: 16px;
            padding: 30px 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px var(--shadow-lg);
            border-left: 6px solid var(--primary);
        }

        .header h1 {
            font-family: 'Spectral', serif;
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .main-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px var(--shadow-lg);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0;
        }

        .nav-tab {
            padding: 15px 25px;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tab:hover {
            color: var(--primary);
            background: rgba(26, 54, 93, 0.05);
        }

        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: rgba(26, 54, 93, 0.05);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group select,
        .form-group input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--surface);
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: var(--secondary-light);
        }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn-accent:hover {
            background: var(--accent-light);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
        }

        .grades-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .grades-table th {
            background: var(--primary);
            color: white;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .grades-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .grades-table tbody tr:hover {
            background: rgba(26, 54, 93, 0.03);
        }

        .grades-table input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-align: center;
            font-family: inherit;
        }

        .grades-table input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26, 54, 93, 0.1);
        }

        .date-inputs {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .date-inputs input {
            width: 60px;
            padding: 6px;
            text-align: center;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid var(--secondary);
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid var(--danger);
        }

        .alert-warning {
            background: #fefcbf;
            color: #744210;
            border-left: 4px solid var(--warning);
        }

        .alert-info {
            background: #bee3f8;
            color: #2c5282;
            border-left: 4px solid var(--primary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            padding: 40px;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            box-shadow: 0 20px 60px var(--shadow-lg);
            animation: modalSlideIn 0.4s ease;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-family: 'Spectral', serif;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text-light);
            cursor: pointer;
            line-height: 1;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .summary-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: transform 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-4px);
        }

        .summary-card h3 {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Spectral', serif;
        }

        .student-row {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .student-row:hover {
            background: rgba(26, 54, 93, 0.03);
            border-color: var(--primary);
        }

        .section-title {
            font-family: 'Spectral', serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .nav-tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
            }

            .student-row {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 24px;
            }
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-danger {
            background: #fed7d7;
            color: var(--danger);
        }

        .badge-success {
            background: #c6f6d5;
            color: var(--secondary);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--secondary);
            transition: width 0.5s ease;
        }

        .progress-fill.low {
            background: var(--danger);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>📚 Sistema de Gestión de Calificaciones</h1>
            <p>Gestión integral de notas y seguimiento académico</p>
        </div>

        <div class="main-card">
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="changeTab('calificaciones')">Registro de Calificaciones</button>
                <button class="nav-tab" onclick="changeTab('nomina')">Gestionar Nómina</button>
                <button class="nav-tab" onclick="changeTab('resumen')">Resumen General</button>
            </div>

            <!-- Tab: Calificaciones -->
            <div id="tab-calificaciones" class="tab-content active">
                <h2 class="section-title">Registro de Calificaciones</h2>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="curso">Curso</label>
                        <select id="curso">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="asignatura">Asignatura</label>
                        <select id="asignatura">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="periodo">Periodo</label>
                        <select id="periodo">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="criterio">Criterio</label>
                        <select id="criterio">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="cargarCalificaciones()">📥 Cargar Calificaciones</button>
                    <button class="btn btn-secondary" onclick="guardarCalificaciones()">💾 Guardar Calificaciones</button>
                </div>

                <div id="grades-container"></div>
            </div>

            <!-- Tab: Nómina -->
            <div id="tab-nomina" class="tab-content">
                <h2 class="section-title">Gestión de Nómina de Estudiantes</h2>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="agregarEstudiante()">➕ Agregar Estudiante</button>
                    <button class="btn btn-secondary" onclick="cargarNomina()">📥 Cargar Nómina</button>
                    <button class="btn btn-accent" onclick="guardarNomina()">💾 Guardar Nómina</button>
                    <label class="btn btn-outline" style="cursor: pointer;">
                        📤 Importar Excel
                        <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" style="display: none;" onchange="importarExcel(event)">
                    </label>
                </div>

                <div id="nomina-container" style="margin-top: 20px;"></div>
            </div>

            <!-- Tab: Resumen -->
            <div id="tab-resumen" class="tab-content">
                <h2 class="section-title">Resumen General de Calificaciones</h2>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="resumen-curso">Curso</label>
                        <select id="resumen-curso">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="resumen-asignatura">Asignatura</label>
                        <select id="resumen-asignatura">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="resumen-periodo">Periodo</label>
                        <select id="resumen-periodo">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="generarResumen()">📊 Generar Resumen</button>
                    <button class="btn btn-accent" onclick="enviarAlertas()">📧 Enviar Alertas Email</button>
                    <button class="btn btn-secondary" onclick="descargarCSV()">📱 Descargar CSV WhatsApp</button>
                </div>

                <div id="resumen-container" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>

    <script>
        // Configuración de la API
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : window.location.origin;

        // Estado global
        let currentGrades = {
            students: [],
            dates: []
        };
        let currentNomina = [];
        let currentResumen = [];

        // Inicialización
        document.addEventListener('DOMContentLoaded', function() {
            cargarSelects();
        });

        // Cambiar entre tabs
        function changeTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Cargar los selects iniciales
        async function cargarSelects() {
            try {
                const [cursos, asignaturas, periodos, criterios] = await Promise.all([
                    fetch(`${API_URL}/api/cursos`).then(r => r.json()),
                    fetch(`${API_URL}/api/asignaturas`).then(r => r.json()),
                    fetch(`${API_URL}/api/periodos`).then(r => r.json()),
                    fetch(`${API_URL}/api/criterios`).then(r => r.json())
                ]);

                // Cargar cursos
                ['curso', 'resumen-curso'].forEach(id => {
                    const select = document.getElementById(id);
                    cursos.forEach(curso => {
                        const option = document.createElement('option');
                        option.value = curso;
                        option.textContent = curso;
                        select.appendChild(option);
                    });
                });

                // Cargar asignaturas
                ['asignatura', 'resumen-asignatura'].forEach(id => {
                    const select = document.getElementById(id);
                    asignaturas.forEach(asignatura => {
                        const option = document.createElement('option');
                        option.value = asignatura;
                        option.textContent = asignatura;
                        select.appendChild(option);
                    });
                });

                // Cargar periodos
                ['periodo', 'resumen-periodo'].forEach(id => {
                    const select = document.getElementById(id);
                    periodos.forEach(periodo => {
                        const option = document.createElement('option');
                        option.value = periodo;
                        option.textContent = periodo;
                        select.appendChild(option);
                    });
                });

                // Cargar criterios
                const criterioSelect = document.getElementById('criterio');
                criterios.forEach(criterio => {
                    const option = document.createElement('option');
                    option.value = criterio;
                    option.textContent = criterio;
                    criterioSelect.appendChild(option);
                });

            } catch (error) {
                showAlert('Error al cargar las opciones: ' + error.message, 'error');
            }
        }

        // Cargar calificaciones
        async function cargarCalificaciones() {
            const curso = document.getElementById('curso').value;
            const asignatura = document.getElementById('asignatura').value;
            const periodo = document.getElementById('periodo').value;
            const criterio = document.getElementById('criterio').value;

            if (!curso || !asignatura || !periodo || !criterio) {
                showAlert('Por favor, seleccione todos los parámetros', 'warning');
                return;
            }

            showLoading(true);

            try {
                // Cargar nómina primero
                const nominaRes = await fetch(`${API_URL}/api/nomina`);
                const nomina = await nominaRes.json();

                // Cargar calificaciones
                const params = new URLSearchParams({ curso, asignatura, periodo, criterio });
                const res = await fetch(`${API_URL}/api/calificaciones?${params}`);
                const data = await res.json();

                // Si hay calificaciones, usarlas; si no, usar nómina
                if (data.students && data.students.length > 0) {
                    currentGrades = data;
                } else {
                    // Crear estructura vacía desde nómina
                    currentGrades = {
                        students: nomina.map((student, index) => ({
                            numero: (index + 1).toString(),
                            nombre: student.nombre,
                            notas: Array(20).fill('')
                        })),
                        dates: Array(20).fill('')
                    };
                }

                renderGradesTable();
                showAlert('Calificaciones cargadas correctamente', 'success');
            } catch (error) {
                showAlert('Error al cargar calificaciones: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Renderizar tabla de calificaciones
        function renderGradesTable() {
            const container = document.getElementById('grades-container');
            
            if (currentGrades.students.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3>No hay estudiantes registrados</h3>
                        <p>Por favor, agregue estudiantes en la sección "Gestionar Nómina"</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="table-container">
                    <table class="grades-table">
                        <thead>
                            <tr>
                                <th style="width: 50px;">N°</th>
                                <th style="min-width: 200px;">Estudiante</th>
            `;

            // Encabezados de fechas
            for (let i = 0; i < 20; i++) {
                html += `
                    <th style="min-width: 120px;">
                        <div class="date-inputs">
                            <input type="number" placeholder="DD" min="1" max="31" 
                                value="${currentGrades.dates[i] ? currentGrades.dates[i].split('/')[0] : ''}"
                                onchange="updateDate(${i}, 0, this.value)">
                            <input type="number" placeholder="MM" min="1" max="12"
                                value="${currentGrades.dates[i] ? currentGrades.dates[i].split('/')[1] : ''}"
                                onchange="updateDate(${i}, 1, this.value)">
                            <input type="number" placeholder="AAAA" min="2020" max="2030"
                                value="${currentGrades.dates[i] ? currentGrades.dates[i].split('/')[2] : ''}"
                                onchange="updateDate(${i}, 2, this.value)">
                        </div>
                    </th>
                `;
            }

            html += `
                            </tr>
                        </thead>
                        <tbody>
            `;

            // Filas de estudiantes
            currentGrades.students.forEach((student, studentIndex) => {
                html += `
                    <tr>
                        <td>${student.numero}</td>
                        <td><strong>${student.nombre}</strong></td>
                `;

                for (let i = 0; i < 20; i++) {
                    const nota = student.notas[i] || '';
                    html += `
                        <td>
                            <input type="number" 
                                step="0.01" 
                                min="0" 
                                max="10" 
                                value="${nota}"
                                onchange="updateGrade(${studentIndex}, ${i}, this.value)">
                        </td>
                    `;
                }

                html += `
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        // Actualizar fecha
        function updateDate(dateIndex, part, value) {
            let dateArr = currentGrades.dates[dateIndex] ? currentGrades.dates[dateIndex].split('/') : ['', '', ''];
            dateArr[part] = value;
            currentGrades.dates[dateIndex] = dateArr.join('/');
        }

        // Actualizar calificación
        function updateGrade(studentIndex, gradeIndex, value) {
            currentGrades.students[studentIndex].notas[gradeIndex] = value;
        }

        // Guardar calificaciones
        async function guardarCalificaciones() {
            const curso = document.getElementById('curso').value;
            const asignatura = document.getElementById('asignatura').value;
            const periodo = document.getElementById('periodo').value;
            const criterio = document.getElementById('criterio').value;

            if (!curso || !asignatura || !periodo || !criterio) {
                showAlert('Por favor, seleccione todos los parámetros', 'warning');
                return;
            }

            showLoading(true);

            try {
                const res = await fetch(`${API_URL}/api/calificaciones`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        curso,
                        asignatura,
                        periodo,
                        criterio,
                        students: currentGrades.students,
                        dates: currentGrades.dates
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showAlert('Calificaciones guardadas correctamente', 'success');
                } else {
                    showAlert('Error al guardar: ' + (data.error || 'Error desconocido'), 'error');
                }
            } catch (error) {
                showAlert('Error al guardar calificaciones: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Cargar nómina
        async function cargarNomina() {
            showLoading(true);

            try {
                const res = await fetch(`${API_URL}/api/nomina`);
                currentNomina = await res.json();
                renderNomina();
                showAlert('Nómina cargada correctamente', 'success');
            } catch (error) {
                showAlert('Error al cargar nómina: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Renderizar nómina
        function renderNomina() {
            const container = document.getElementById('nomina-container');
            
            let html = '<div style="margin-top: 20px;">';

            if (currentNomina.length === 0) {
                html += `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <h3>No hay estudiantes registrados</h3>
                        <p>Agregue estudiantes usando el botón "Agregar Estudiante"</p>
                    </div>
                `;
            } else {
                currentNomina.forEach((student, index) => {
                    html += `
                        <div class="student-row">
                            <input type="text" placeholder="Nombre completo" 
                                value="${student.nombre || ''}"
                                onchange="updateNomina(${index}, 'nombre', this.value)"
                                style="padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem;">
                            <input type="email" placeholder="correo@ejemplo.com" 
                                value="${student.correo || ''}"
                                onchange="updateNomina(${index}, 'correo', this.value)"
                                style="padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem;">
                            <input type="tel" placeholder="0999999999" 
                                value="${student.telefono || ''}"
                                onchange="updateNomina(${index}, 'telefono', this.value)"
                                style="padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem;">
                            <button class="btn btn-danger" onclick="eliminarEstudiante(${index})" style="padding: 10px 16px;">
                                🗑️
                            </button>
                        </div>
                    `;
                });
            }

            html += '</div>';
            container.innerHTML = html;
        }

        // Agregar estudiante
        function agregarEstudiante() {
            currentNomina.push({ nombre: '', correo: '', telefono: '' });
            renderNomina();
        }

        // Actualizar nómina
        function updateNomina(index, field, value) {
            currentNomina[index][field] = value;
        }

        // Eliminar estudiante
        function eliminarEstudiante(index) {
            if (confirm('¿Está seguro de eliminar este estudiante?')) {
                currentNomina.splice(index, 1);
                renderNomina();
            }
        }

        // Guardar nómina
        async function guardarNomina() {
            showLoading(true);

            try {
                const res = await fetch(`${API_URL}/api/nomina`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ students: currentNomina })
                });

                const data = await res.json();

                if (data.success) {
                    showAlert('Nómina guardada correctamente', 'success');
                } else {
                    showAlert('Error al guardar: ' + (data.error || 'Error desconocido'), 'error');
                }
            } catch (error) {
                showAlert('Error al guardar nómina: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Importar Excel
        async function importarExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            showAlert('Función de importación de Excel en desarrollo. Por favor, ingrese los datos manualmente.', 'info');
        }

        // Generar resumen
        async function generarResumen() {
            const curso = document.getElementById('resumen-curso').value;
            const asignatura = document.getElementById('resumen-asignatura').value;
            const periodo = document.getElementById('resumen-periodo').value;

            if (!curso || !asignatura || !periodo) {
                showAlert('Por favor, seleccione todos los parámetros', 'warning');
                return;
            }

            showLoading(true);

            try {
                const res = await fetch(`${API_URL}/api/resumen`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ curso, asignatura, periodo })
                });

                currentResumen = await res.json();
                renderResumen();
                showAlert('Resumen generado correctamente', 'success');
            } catch (error) {
                showAlert('Error al generar resumen: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Renderizar resumen
        function renderResumen() {
            const container = document.getElementById('resumen-container');
            
            if (currentResumen.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <h3>No hay datos para mostrar</h3>
                        <p>Genere un resumen seleccionando los parámetros arriba</p>
                    </div>
                `;
                return;
            }

            // Contar estudiantes con bajo rendimiento
            const bajosPromedios = currentResumen.filter(e => e.promedio_final < 7).length;

            let html = `
                <div class="summary-grid">
                    <div class="summary-card">
                        <h3>Total Estudiantes</h3>
                        <div class="value">${currentResumen.length}</div>
                    </div>
                    <div class="summary-card" style="background: linear-gradient(135deg, ${bajosPromedios > 0 ? '#e53e3e' : '#38a169'} 0%, ${bajosPromedios > 0 ? '#c53030' : '#2f855a'} 100%);">
                        <h3>Requieren Apoyo</h3>
                        <div class="value">${bajosPromedios}</div>
                    </div>
                    <div class="summary-card" style="background: linear-gradient(135deg, #38a169 0%, #2f855a 100%);">
                        <h3>Promedio General</h3>
                        <div class="value">${(currentResumen.reduce((sum, e) => sum + e.promedio_final, 0) / currentResumen.length).toFixed(2)}</div>
                    </div>
                </div>

                <h3 class="section-title" style="margin-top: 30px;">Detalle por Estudiante</h3>
            `;

            // Tabla de resumen
            html += `
                <div class="table-container">
                    <table class="grades-table">
                        <thead>
                            <tr>
                                <th>Estudiante</th>
                                <th>Lecciones</th>
                                <th>Tareas</th>
                                <th>Act. Grupal</th>
                                <th>Extra 1</th>
                                <th>Extra 2</th>
                                <th>Firmas</th>
                                <th>Promedio Final</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            currentResumen.forEach(estudiante => {
                const promedioFinal = estudiante.promedio_final;
                const estado = promedioFinal < 7 ? 'danger' : 'success';
                const estadoTexto = promedioFinal < 7 ? 'Requiere apoyo' : 'Aprobado';

                html += `
                    <tr>
                        <td><strong>${estudiante.nombre}</strong></td>
                        <td>${estudiante.promedios_criterios['Lecciones'] || '-'}</td>
                        <td>${estudiante.promedios_criterios['Tareas'] || '-'}</td>
                        <td>${estudiante.promedios_criterios['Actividad Grupal'] || '-'}</td>
                        <td>${estudiante.promedios_criterios['Extra 1'] || '-'}</td>
                        <td>${estudiante.promedios_criterios['Extra 2'] || '-'}</td>
                        <td>${estudiante.promedios_criterios['Firmas'] || '-'}</td>
                        <td><strong style="color: ${promedioFinal < 7 ? 'var(--danger)' : 'var(--secondary)'};">${promedioFinal.toFixed(2)}</strong></td>
                        <td><span class="badge badge-${estado}">${estadoTexto}</span></td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        // Enviar alertas por email
        async function enviarAlertas() {
            if (currentResumen.length === 0) {
                showAlert('Primero genere un resumen', 'warning');
                return;
            }

            const estudiantesBajos = currentResumen.filter(e => e.promedio_final < 7);

            if (estudiantesBajos.length === 0) {
                showAlert('No hay estudiantes con promedio menor a 7', 'info');
                return;
            }

            if (!confirm(`Se enviarán ${estudiantesBajos.length} correos. ¿Desea continuar?`)) {
                return;
            }

            showLoading(true);

            try {
                const curso = document.getElementById('resumen-curso').value;
                const asignatura = document.getElementById('resumen-asignatura').value;
                const periodo = document.getElementById('resumen-periodo').value;

                const res = await fetch(`${API_URL}/api/enviar-alertas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        estudiantes: estudiantesBajos,
                        curso,
                        asignatura,
                        periodo
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showAlert(data.message, 'success');
                } else {
                    showAlert('Error al enviar alertas: ' + (data.error || 'Error desconocido'), 'error');
                }
            } catch (error) {
                showAlert('Error al enviar alertas: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Descargar CSV para WhatsApp
        async function descargarCSV() {
            if (currentResumen.length === 0) {
                showAlert('Primero genere un resumen', 'warning');
                return;
            }

            const estudiantesBajos = currentResumen.filter(e => e.promedio_final < 7);

            if (estudiantesBajos.length === 0) {
                showAlert('No hay estudiantes con promedio menor a 7', 'info');
                return;
            }

            showLoading(true);

            try {
                const curso = document.getElementById('resumen-curso').value;
                const asignatura = document.getElementById('resumen-asignatura').value;
                const periodo = document.getElementById('resumen-periodo').value;

                const res = await fetch(`${API_URL}/api/generar-csv`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        estudiantes: estudiantesBajos,
                        curso,
                        asignatura,
                        periodo
                    })
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `alertas_whatsapp_${new Date().getTime()}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    showAlert('CSV descargado correctamente', 'success');
                } else {
                    showAlert('Error al descargar CSV', 'error');
                }
            } catch (error) {
                showAlert('Error al descargar CSV: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Mostrar alerta
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;

            document.querySelector('.main-card').insertBefore(alertDiv, document.querySelector('.nav-tabs'));

            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // Mostrar/ocultar loading
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('active');
            } else {
                loading.classList.remove('active');
            }
        }
    </script>
</body>
</html>
